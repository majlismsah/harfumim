<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Kehadiran - KAJIAN HARFU MIM CIBODAS</title>
    <!-- Menggunakan Tailwind CSS CDN agar tampilan langsung modern & rapi -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        <!-- Header Banner Pilihan 1 (Elegan & Berjarak) -->
        <div class="bg-gradient-to-br from-emerald-700 to-emerald-800 p-6 text-center text-white relative overflow-hidden rounded-t-2xl">
            <!-- Dekorasi aksen lingkaran transparan dibelakang teks -->
            <div class="absolute -top-10 -right-10 w-24 h-24 bg-white/5 rounded-full pointer-events-none"></div>
            <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-white/5 rounded-full pointer-events-none"></div>

            <span class="text-[10px] font-bold tracking-widest uppercase bg-emerald-900/50 border border-emerald-500/30 px-3 py-1 rounded-full text-emerald-200 inline-block mb-3">
                🕌 Registrasi Kehadiran
            </span>
            <h1 class="text-xl font-black tracking-wide text-balance leading-tight drop-shadow-sm">
                KAJIAN HARFU MIM CIBODAS
            </h1>
            
            <!-- Info detail terpisah baris agar tidak padat -->
            <div class="mt-4 pt-3 border-t border-emerald-600/50 flex flex-col items-center justify-center gap-1.5 text-xs text-emerald-100/90 font-medium">
                <div class="flex items-center gap-1.5">
                    <span>🗓️</span> 
                    <span>Sabtu & Minggu, 4 - 5 Juli 2026</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <span>📍</span> 
                    <span class="font-bold text-white">Pondok Pemuda Cibodas</span>
                </div>
            </div>
        </div>

        <!-- Form Pendaftaran -->
        <form id="formPendaftaran" class="p-6 space-y-5">
            
            <!-- Input Nama (Auto Kapital saat mengetik) -->
            <div>
                <label for="nama" class="block text-sm font-bold text-slate-700 mb-1">Nama Lengkap Jamaah</label>
                <input type="text" id="nama" name="nama" required placeholder="MASUKKAN NAMA LENGKAP" 
                    oninput="this.value = this.value.toUpperCase()"
                    class="w-full px-3 py-2.5 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 text-sm placeholder:text-slate-400">
            </div>

            <!-- Input Nomor WhatsApp -->
            <div>
                <label for="nowa" class="block text-sm font-bold text-slate-700 mb-1">Nomor WhatsApp Aktif</label>
                <input type="tel" id="nowa" name="nowa" required placeholder="Contoh: 08123456789" 
                    class="w-full px-3 py-2.5 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 text-sm">
                <p class="text-[11px] text-slate-500 mt-1">Pastikan nomor aktif untuk menerima QR Code absensi.</p>
            </div>

            <!-- Dropdown Pilihan Majlis -->
            <div>
                <label for="majlis" class="block text-sm font-bold text-slate-700 mb-1">Pilih Majlis</label>
                <div class="relative">
                    <select id="majlis" name="majlis" required 
                        class="w-full px-3 py-2.5 border border-slate-300 rounded-lg shadow-sm bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 text-sm appearance-none cursor-pointer">
                        <option value="" disabled selected>-- Silakan Pilih Majlis Anda --</option>
                        <option value="Ar-Rohman">Ar-Rohman</option>
                        <option value="Ar-Rohim">Ar-Rohim</option>
                        <option value="Al-Malik">Al-Malik</option>
                        <option value="Al-Quddus">Al-Quddus</option>
                        <option value="Nurul Hikmah">Nurul Hikmah</option>
                        <option value="Nurul Hakim">Nurul Hakim</option>
                        <option value="Nurul Salikin">Nurul Salikin</option>
                        <option value="Nurul Kamilah">Nurul Kamilah</option>
                        <option value="Kuningan">Kuningan</option>
                        <option value="RJ">RJ</option>
                        <option value="Umum">Umum</option>
                    </select>
                    <!-- Ikon panah kustom untuk dropdown -->
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-500">
                        <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                    </div>
                </div>
            </div>

            <!-- Tombol Submit -->
            <button type="submit" id="btnSubmit" 
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition duration-150 ease-in-out hover:shadow-lg active:scale-[0.98] text-sm tracking-wide">
                DAFTAR KEHADIRAN SEKARANG
            </button>

            <p class="text-[11px] text-center text-slate-400 mt-4">Sistem Absensi Digital • Kajian Harfu Mim © 2026</p>
        </form>
    </div>

    <!-- LOGIKA JAVASCRIPT -->
    <script>
        document.getElementById('formPendaftaran').addEventListener('submit', function(e) {
            e.preventDefault(); // Mencegah reload halaman
            
            // Mengubah tombol menjadi mode loading
            const btn = document.getElementById('btnSubmit');
            btn.innerText = "Memproses Pendaftaran...";
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            // Mengambil data dari form
            const namaClean = document.getElementById('nama').value.trim();
            let nowaRaw = document.getElementById('nowa').value.trim();
            const majlis = document.getElementById('majlis').value;

            // Logika Membersihkan Nomor WA ke Format Internasional (62)
            let nowaClean = nowaRaw.replace(/[^0-9]/g, ''); 
            
            if (nowaClean.startsWith('0')) {
                nowaClean = '62' + nowaClean.slice(1);
            } else if (nowaClean.startsWith('8')) {
                nowaClean = '62' + nowaClean;
            }

            // Data yang akan dikirim ke Google Sheets
            const dataJamaah = {
                nama: namaClean,
                nowa: nowaClean, 
                majlis: majlis
            };

            // ====================================================================
            // CONFIGURATION: URL UTAMA YANG SUDAH TERBUKTI BISA MASUK & NO ADMIN
            // ====================================================================
            const urlAppsScript = "https://script.google.com/macros/s/AKfycbyQqtoTpP0FB0oc6KK2RvQAgBFBVRr_SUMHxJ109tQ3FI-oQF9LKvasbCMd59FSQob_5Q/exec"; 
            const nomorAdmin = "62816787977"; 

            // Kirim data ke Google Sheets secara background menggunakan fetch
            fetch(urlAppsScript, {
                method: 'POST',
                mode: 'no-cors', // Wajib untuk bypass masalah CORS di Google Apps Script
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(dataJamaah)
            })
            .then(() => {
                // Begitu data sukses masuk Google Sheets, langsung alihkan ke chat WA Admin
                const isiPesan = `Assalamu'alaikum Admin,%0A%0Asaya sudah mengisi data pendaftaran KAJIAN HARFU MIM CIBODAS.%0A%0A*Data Pendaftaran:*%0A• Nama: ${encodeURIComponent(dataJamaah.nama)}%0A• No WA: ${encodeURIComponent(dataJamaah.nowa)}%0A• Majlis: ${encodeURIComponent(dataJamaah.majlis)}%0A%0AMohon di-follow up untuk link QR Code absensi dan lokasi acaranya. Terima kasih.`;

                window.location.href = `https://wa.me/${nomorAdmin}?text=${isiPesan}`;
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Pendaftaran gagal disimpan ke database. Silakan coba kembali.');
                
                // Reset tombol jika pengiriman gagal total
                btn.innerText = "DAFTAR KEHADIRAN SEKARANG";
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            });
        });
    </script>
</body>
</html>
